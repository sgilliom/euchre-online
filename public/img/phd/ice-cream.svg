<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" fill="none">
  <!-- Scoop of ice cream -->
  <ellipse cx="60" cy="55" rx="35" ry="32" fill="#F9A8D4"/>
  <circle cx="60" cy="40" r="28" fill="#FBCFE8"/>
  <!-- Chocolate drips -->
  <path d="M45 58 Q42 68 44 75" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M72 60 Q76 70 73 78" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Sprinkles -->
  <rect x="50" y="35" width="8" height="3" rx="1.5" fill="#EF4444" transform="rotate(-20 50 35)"/>
  <rect x="65" y="42" width="8" height="3" rx="1.5" fill="#3B82F6" transform="rotate(15 65 42)"/>
  <rect x="53" y="50" width="8" height="3" rx="1.5" fill="#10B981" transform="rotate(-10 53 50)"/>
  <!-- Cone -->
  <path d="M25 72 L60 148 L95 72 Z" fill="#D97706"/>
  <path d="M25 72 L60 148 L95 72" fill="none" stroke="#B45309" stroke-width="1"/>
  <!-- Cone grid lines -->
  <line x1="25" y1="72" x2="60" y2="148" stroke="#B45309" stroke-width="0.8"/>
  <line x1="95" y1="72" x2="60" y2="148" stroke="#B45309" stroke-width="0.8"/>
  <line x1="35" y1="97" x2="85" y2="97" stroke="#B45309" stroke-width="0.8"/>
  <line x1="42" y1="115" x2="78" y2="115" stroke="#B45309" stroke-width="0.8"/>
  <line x1="49" y1="131" x2="71" y2="131" stroke="#B45309" stroke-width="0.8"/>
  <!-- Cone rim -->
  <ellipse cx="60" cy="72" rx="35" ry="5" fill="#D97706" stroke="#B45309" stroke-width="1"/>
</svg>
