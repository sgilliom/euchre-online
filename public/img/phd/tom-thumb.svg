<svg viewBox="0 0 480 220" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <rect width="480" height="220" fill="#0f172a" rx="8"/>
  <text x="240" y="20" fill="#6366f1" font-size="11" text-anchor="middle" font-weight="bold">AUTOMOTIVE ASSEMBLY — HIGH-CYCLE COMPACT CYLINDER</text>

  <!-- assembly line base -->
  <rect x="20" y="170" width="440" height="12" fill="#334155" rx="2"/>
  <!-- support columns -->
  <rect x="60" y="120" width="12" height="52" fill="#475569" rx="2"/>
  <rect x="200" y="100" width="12" height="72" fill="#475569" rx="2"/>
  <rect x="340" y="120" width="12" height="52" fill="#475569" rx="2"/>

  <!-- mounting bracket 1 -->
  <rect x="40" y="108" width="50" height="16" fill="#1e293b" stroke="#475569" stroke-width="1.5" rx="3"/>
  <!-- small compact cylinder 1 -->
  <rect x="90" y="110" width="38" height="12" fill="#1e3a5f" stroke="#6366f1" stroke-width="1.5" rx="3"/>
  <rect x="126" y="114" width="18" height="4" fill="#60a5fa" rx="1"/>
  <text x="109" y="107" fill="#6366f1" font-size="8" text-anchor="middle">TOM THUMB®</text>

  <!-- mounting bracket 2 (tight space callout) -->
  <rect x="180" y="88" width="50" height="16" fill="#1e293b" stroke="#475569" stroke-width="1.5" rx="3"/>
  <!-- small compact cylinder 2 -->
  <rect x="228" y="90" width="38" height="12" fill="#1e3a5f" stroke="#6366f1" stroke-width="1.5" rx="3"/>
  <rect x="264" y="94" width="18" height="4" fill="#60a5fa" rx="1"/>
  <!-- tight space bracket -->
  <rect x="175" y="80" width="130" height="3" fill="#ef4444" rx="1" opacity="0.6"/>
  <rect x="175" y="105" width="130" height="3" fill="#ef4444" rx="1" opacity="0.6"/>
  <line x1="175" y1="80" x2="175" y2="108" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="305" y1="80" x2="305" y2="108" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="316" y="95" fill="#ef4444" font-size="8">LIMITED</text>
  <text x="316" y="105" fill="#ef4444" font-size="8">SPACE</text>

  <!-- mounting bracket 3 -->
  <rect x="320" y="108" width="50" height="16" fill="#1e293b" stroke="#475569" stroke-width="1.5" rx="3"/>
  <!-- small compact cylinder 3 -->
  <rect x="368" y="110" width="38" height="12" fill="#1e3a5f" stroke="#6366f1" stroke-width="1.5" rx="3"/>
  <rect x="404" y="114" width="18" height="4" fill="#60a5fa" rx="1"/>

  <!-- workpiece on line -->
  <rect x="130" y="147" width="50" height="25" fill="#475569" stroke="#64748b" stroke-width="1.5" rx="3"/>
  <rect x="270" y="147" width="50" height="25" fill="#475569" stroke="#64748b" stroke-width="1.5" rx="3"/>

  <!-- cycle count badge -->
  <rect x="155" y="60" width="170" height="22" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" rx="4"/>
  <text x="240" y="75" fill="#f59e0b" font-size="10" text-anchor="middle" font-weight="bold">50 MILLION+ CYCLE LIFE</text>

  <!-- arrows showing rebuildable -->
  <text x="240" y="200" fill="#22c55e" font-size="9" text-anchor="middle">✓ Durable   ✓ Versatile   ✓ Rebuildable</text>
</svg>
