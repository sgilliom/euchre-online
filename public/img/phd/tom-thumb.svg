<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Cylinder body -->
  <rect x="30" y="35" width="60" height="50" rx="4" fill="#64748B"/>
  <!-- End caps -->
  <rect x="18" y="30" width="14" height="60" rx="3" fill="#475569"/>
  <rect x="88" y="30" width="14" height="60" rx="3" fill="#475569"/>
  <!-- Piston rod -->
  <rect x="102" y="52" width="14" height="16" rx="2" fill="#CBD5E1"/>
  <!-- Port nipples -->
  <circle cx="50" cy="28" r="4" fill="#334155"/>
  <circle cx="70" cy="28" r="4" fill="#334155"/>
  <!-- Cylinder highlight -->
  <rect x="30" y="35" width="60" height="12" rx="4" fill="#94A3B8" opacity="0.4"/>
  <!-- Mounting holes -->
  <circle cx="38" cy="85" r="3" fill="#1E293B"/>
  <circle cx="82" cy="85" r="3" fill="#1E293B"/>
  <!-- Label -->
  <text x="60" y="65" font-family="Arial" font-size="8" fill="white" text-anchor="middle" font-weight="bold">PHD</text>
  <text x="60" y="74" font-family="Arial" font-size="6" fill="#CBD5E1" text-anchor="middle">Tom Thumb®</text>
</svg>
