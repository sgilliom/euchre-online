<svg viewBox="0 0 480 220" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <rect width="480" height="220" fill="#0f172a" rx="8"/>
  <text x="240" y="20" fill="#6366f1" font-size="11" text-anchor="middle" font-weight="bold">MATERIAL HANDLING — POWERED LINEAR SLIDE (GANTRY)</text>

  <!-- gantry frame left post -->
  <rect x="45" y="45" width="14" height="140" fill="#334155" rx="3"/>
  <!-- gantry frame right post -->
  <rect x="421" y="45" width="14" height="140" fill="#334155" rx="3"/>
  <!-- gantry top rail -->
  <rect x="45" y="45" width="390" height="18" fill="#475569" rx="3"/>
  <!-- linear slide rail (horizontal guide) -->
  <rect x="59" y="63" width="362" height="14" fill="#1e3a5f" stroke="#6366f1" stroke-width="2" rx="3"/>

  <!-- slide carriage -->
  <rect x="185" y="58" width="60" height="24" fill="#4338ca" stroke="#6366f1" stroke-width="2" rx="4"/>
  <!-- carriage motor/body detail -->
  <circle cx="215" cy="70" r="6" fill="#6366f1"/>
  <circle cx="215" cy="70" r="3" fill="#0f172a"/>

  <!-- guide rods / bearings on carriage -->
  <rect x="188" y="61" width="8" height="18" fill="#1d4ed8" rx="2"/>
  <rect x="244" y="61" width="8" height="18" fill="#1d4ed8" rx="2"/>

  <!-- vertical drop arm -->
  <rect x="208" y="80" width="14" height="38" fill="#475569" rx="2"/>

  <!-- gripper at bottom of arm -->
  <rect x="196" y="116" width="38" height="14" fill="#6366f1" rx="3"/>
  <!-- gripper jaws -->
  <rect x="200" y="128" width="8" height="12" fill="#4338ca" rx="1"/>
  <rect x="234" y="128" width="8" height="12" fill="#4338ca" rx="1"/>

  <!-- part being carried (10lb stamp) -->
  <rect x="202" y="138" width="38" height="20" fill="#94a3b8" stroke="#64748b" stroke-width="1.5" rx="3"/>
  <text x="221" y="151" fill="#0f172a" font-size="8" text-anchor="middle">10 LB</text>

  <!-- travel arrows -->
  <line x1="80" y1="38" x2="140" y2="38" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="142,38 134,33 134,43" fill="#22c55e"/>
  <line x1="340" y1="38" x2="400" y2="38" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="402,38 394,33 394,43" fill="#22c55e"/>

  <!-- stroke dimension -->
  <text x="240" y="36" fill="#22c55e" font-size="9" text-anchor="middle">18" HORIZONTAL TRAVEL</text>

  <!-- load capacity badge -->
  <rect x="310" y="90" width="110" height="36" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" rx="4"/>
  <text x="365" y="104" fill="#f59e0b" font-size="8" text-anchor="middle">UP TO 300 LB</text>
  <text x="365" y="115" fill="#f59e0b" font-size="8" text-anchor="middle">LOAD CAPACITY</text>

  <!-- bearing type label -->
  <rect x="60" y="90" width="110" height="36" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" rx="4"/>
  <text x="115" y="104" fill="#a5b4fc" font-size="8" text-anchor="middle">MULTIPLE BEARING</text>
  <text x="115" y="115" fill="#a5b4fc" font-size="8" text-anchor="middle">TYPES AVAILABLE</text>

  <!-- pickup / place stations -->
  <rect x="55" y="168" width="60" height="25" fill="#1e293b" stroke="#475569" stroke-width="1" rx="3"/>
  <text x="85" y="183" fill="#94a3b8" font-size="8" text-anchor="middle">PICK STATION</text>
  <rect x="365" y="168" width="60" height="25" fill="#1e293b" stroke="#475569" stroke-width="1" rx="3"/>
  <text x="395" y="183" fill="#94a3b8" font-size="8" text-anchor="middle">PLACE STATION</text>

  <text x="240" y="205" fill="#94a3b8" font-size="9" text-anchor="middle">12+ SLIDE STYLES — PNEUMATIC &amp; ELECTRIC — THRUSTER &amp; GANTRY</text>
</svg>
