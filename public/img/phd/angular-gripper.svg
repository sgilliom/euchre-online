<svg viewBox="0 0 480 220" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <rect width="480" height="220" fill="#0f172a" rx="8"/>
  <text x="240" y="20" fill="#6366f1" font-size="11" text-anchor="middle" font-weight="bold">ROBOT END-OF-ARM — STAMPING PART HANDLING</text>

  <!-- robot arm -->
  <line x1="240" y1="35" x2="240" y2="75" stroke="#475569" stroke-width="6" stroke-linecap="round"/>
  <line x1="240" y1="75" x2="200" y2="105" stroke="#475569" stroke-width="5" stroke-linecap="round"/>
  <circle cx="240" cy="75" r="7" fill="#334155" stroke="#6366f1" stroke-width="1.5"/>
  <circle cx="200" cy="105" r="6" fill="#334155" stroke="#6366f1" stroke-width="1.5"/>
  <rect x="220" y="28" width="40" height="10" fill="#1e3a5f" rx="3"/>
  <text x="240" y="36" fill="#6366f1" font-size="7" text-anchor="middle">ROBOT</text>

  <!-- EA/EL Series gripper body (heavy duty parallel) -->
  <rect x="178" y="105" width="44" height="22" fill="#1e3a5f" stroke="#6366f1" stroke-width="2.5" rx="4"/>
  <text x="200" y="119" fill="#a5b4fc" font-size="7" text-anchor="middle">Series EA/EL</text>
  <!-- parallel jaws open -->
  <rect x="174" y="125" width="10" height="28" fill="#4338ca" rx="2"/>
  <rect x="216" y="125" width="10" height="28" fill="#4338ca" rx="2"/>
  <!-- jaw open arrows -->
  <line x1="172" y1="140" x2="162" y2="140" stroke="#f59e0b" stroke-width="1.5"/>
  <polygon points="160,140 167,136 167,144" fill="#f59e0b"/>
  <line x1="228" y1="140" x2="238" y2="140" stroke="#f59e0b" stroke-width="1.5"/>
  <polygon points="240,140 233,136 233,144" fill="#f59e0b"/>

  <!-- heavy stamping part between jaws -->
  <rect x="183" y="128" width="34" height="26" fill="#64748b" stroke="#94a3b8" stroke-width="2" rx="2"/>
  <!-- stamping holes/features -->
  <circle cx="193" cy="138" r="3" fill="#334155"/>
  <circle cx="207" cy="138" r="3" fill="#334155"/>
  <rect x="186" y="146" width="28" height="4" fill="#475569" rx="1"/>

  <!-- shock/impact indicator -->
  <text x="200" y="168" fill="#22c55e" font-size="8" text-anchor="middle">EXTERNAL GRIP</text>

  <!-- spec badges -->
  <rect x="280" y="70" width="170" height="110" fill="#0a1628" rx="6" stroke="#1e293b" stroke-width="1"/>
  <text x="365" y="87" fill="#6366f1" font-size="9" text-anchor="middle" font-weight="bold">Series EA / EL / EH</text>
  <line x1="285" y1="92" x2="445" y2="92" stroke="#1e293b" stroke-width="1"/>

  <text x="290" y="106" fill="#22c55e" font-size="8">✓</text>
  <text x="300" y="106" fill="#94a3b8" font-size="8">Rugged jaw design</text>
  <text x="290" y="119" fill="#22c55e" font-size="8">✓</text>
  <text x="300" y="119" fill="#94a3b8" font-size="8">High impact &amp; shock loads</text>
  <text x="290" y="132" fill="#22c55e" font-size="8">✓</text>
  <text x="300" y="132" fill="#94a3b8" font-size="8">Bronze bearings</text>
  <text x="290" y="145" fill="#22c55e" font-size="8">✓</text>
  <text x="300" y="145" fill="#94a3b8" font-size="8">Internal/external grip</text>
  <text x="290" y="158" fill="#22c55e" font-size="8">✓</text>
  <text x="300" y="158" fill="#94a3b8" font-size="8">Rebuildable</text>
  <text x="290" y="171" fill="#22c55e" font-size="8">✓</text>
  <text x="300" y="171" fill="#94a3b8" font-size="8">Up to 1,600 lb grip force</text>

  <text x="240" y="205" fill="#94a3b8" font-size="9" text-anchor="middle">AUTOMOTIVE BODY SHOP — HIGH-CYCLE ROBOT END-OF-ARM TOOLING</text>
</svg>
