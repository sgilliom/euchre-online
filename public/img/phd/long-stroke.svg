<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 80" fill="none">
  <!-- Long cylinder body -->
  <rect x="10" y="25" width="130" height="30" rx="4" fill="#475569" stroke="#64748B" stroke-width="1.5"/>
  <!-- End cap left -->
  <rect x="5" y="20" width="12" height="40" rx="3" fill="#374151" stroke="#4B5563" stroke-width="1"/>
  <!-- End cap right -->
  <rect x="138" y="20" width="12" height="40" rx="3" fill="#374151" stroke="#4B5563" stroke-width="1"/>
  <!-- Extended piston rod -->
  <rect x="150" y="34" width="25" height="12" rx="2" fill="#CBD5E1"/>
  <!-- Rod end clevis -->
  <rect x="172" y="31" width="6" height="18" rx="2" fill="#94A3B8"/>
  <circle cx="175" cy="40" r="4" fill="#64748B"/>
  <circle cx="175" cy="40" r="2" fill="#1E293B"/>
  <!-- Cylinder highlight -->
  <rect x="10" y="25" width="130" height="10" rx="4" fill="#94A3B8" opacity="0.3"/>
  <!-- Port fittings -->
  <circle cx="40" cy="22" r="4" fill="#334155" stroke="#475569" stroke-width="1"/>
  <circle cx="115" cy="22" r="4" fill="#334155" stroke="#475569" stroke-width="1"/>
  <!-- ISO standard mounting indicators -->
  <rect x="50" y="55" width="8" height="5" rx="1" fill="#1E293B"/>
  <rect x="105" y="55" width="8" height="5" rx="1" fill="#1E293B"/>
  <!-- Stroke dimension arrow -->
  <line x1="10" y1="70" x2="150" y2="70" stroke="#F59E0B" stroke-width="1.5"/>
  <path d="M12 67 L5 70 L12 73" fill="#F59E0B"/>
  <path d="M148 67 L155 70 L148 73" fill="#F59E0B"/>
  <text x="80" y="68" font-family="Arial" font-size="8" fill="#F59E0B" text-anchor="middle">22" stroke</text>
  <!-- ISO label -->
  <text x="80" y="42" font-family="Arial" font-size="7" fill="white" text-anchor="middle">PHD Series CV — ISO</text>
</svg>
