<svg viewBox="0 0 480 220" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <rect width="480" height="220" fill="#0f172a" rx="8"/>
  <text x="240" y="20" fill="#6366f1" font-size="11" text-anchor="middle" font-weight="bold">PACKAGING LINE — LONG-STROKE ISO CYLINDER APPLICATION</text>

  <!-- packaging conveyor base -->
  <rect x="20" y="168" width="440" height="12" fill="#334155" rx="2"/>
  <circle cx="40" cy="174" r="8" fill="#475569"/>
  <circle cx="440" cy="174" r="8" fill="#475569"/>

  <!-- boxes on conveyor -->
  <rect x="60" y="140" width="50" height="30" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <line x1="60" y1="155" x2="110" y2="155" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="85" y="152" fill="#60a5fa" font-size="8" text-anchor="middle">BOX</text>

  <rect x="200" y="140" width="50" height="30" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <line x1="200" y1="155" x2="250" y2="155" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="225" y="152" fill="#60a5fa" font-size="8" text-anchor="middle">BOX</text>

  <rect x="350" y="140" width="50" height="30" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" rx="2"/>
  <text x="375" y="152" fill="#60a5fa" font-size="8" text-anchor="middle">BOX</text>

  <!-- Series CV ISO cylinder (long) - main focus -->
  <rect x="60" y="78" width="300" height="30" fill="#1e3a5f" stroke="#6366f1" stroke-width="2.5" rx="5"/>
  <!-- piston rod extending right -->
  <rect x="358" y="89" width="65" height="8" fill="#60a5fa" rx="2"/>
  <!-- end cap left -->
  <rect x="55" y="76" width="10" height="34" fill="#4338ca" rx="3"/>
  <!-- end cap right -->
  <rect x="358" y="76" width="10" height="34" fill="#4338ca" rx="3"/>
  <!-- cylinder bore detail -->
  <rect x="75" y="84" width="270" height="18" fill="#0f172a" rx="2" opacity="0.4"/>

  <!-- ISO mounting holes -->
  <circle cx="80" cy="93" r="4" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="340" cy="93" r="4" fill="none" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- stroke dimension line -->
  <line x1="60" y1="60" x2="360" y2="60" stroke="#f59e0b" stroke-width="1"/>
  <line x1="60" y1="55" x2="60" y2="65" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="360" y1="55" x2="360" y2="65" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="210" y="56" fill="#f59e0b" font-size="9" text-anchor="middle">LONG STROKE (up to 24"+)</text>

  <!-- ISO badge -->
  <rect x="155" y="83" width="50" height="14" fill="#1d4ed8" rx="3"/>
  <text x="180" y="93" fill="#fff" font-size="9" text-anchor="middle" font-weight="bold">ISO STD</text>

  <!-- pusher plate at rod end -->
  <rect x="420" y="82" width="18" height="26" fill="#475569" stroke="#64748b" stroke-width="1.5" rx="2"/>
  <!-- pushing box arrow -->
  <line x1="437" y1="95" x2="455" y2="95" stroke="#22c55e" stroke-width="2"/>
  <polygon points="457,95 449,90 449,100" fill="#22c55e"/>

  <!-- mounting bracket -->
  <rect x="165" y="108" width="20" height="30" fill="#334155" rx="2"/>
  <rect x="255" y="108" width="20" height="30" fill="#334155" rx="2"/>

  <text x="420" y="135" fill="#22c55e" font-size="8" text-anchor="middle">PUSH</text>
  <text x="210" y="200" fill="#94a3b8" font-size="9" text-anchor="middle">Series CV — DESIGNED FOR LONG TRAVEL &amp; LONG LIFE</text>
</svg>
