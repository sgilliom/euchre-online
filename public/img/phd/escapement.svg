<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Parts queue / chute -->
  <rect x="10" y="20" width="40" height="80" rx="3" fill="#374151" stroke="#6B7280" stroke-width="1"/>
  <!-- Parts in chute -->
  <circle cx="30" cy="90" r="7" fill="#9CA3AF"/>
  <circle cx="30" cy="73" r="7" fill="#9CA3AF"/>
  <circle cx="30" cy="56" r="7" fill="#9CA3AF"/>
  <circle cx="30" cy="39" r="7" fill="#9CA3AF"/>
  <!-- Escapement body -->
  <rect x="48" y="70" width="30" height="22" rx="3" fill="#1D4ED8" stroke="#3B82F6" stroke-width="1.5"/>
  <!-- Escapement rod 1 (blocking) -->
  <rect x="46" y="82" width="8" height="6" rx="1" fill="#93C5FD"/>
  <!-- Escapement rod 2 (release) -->
  <rect x="68" y="75" width="6" height="8" rx="1" fill="#93C5FD"/>
  <!-- Released part -->
  <circle cx="90" cy="82" r="7" fill="#F59E0B"/>
  <!-- Arrow showing release -->
  <path d="M82 82 L98 82" stroke="#10B981" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#10B981"/>
    </marker>
  </defs>
  <!-- Output chute -->
  <rect x="97" y="78" width="18" height="10" rx="2" fill="#374151" stroke="#6B7280" stroke-width="1"/>
  <!-- Label -->
  <text x="63" y="103" font-family="Arial" font-size="6" fill="#93C5FD" text-anchor="middle">PHD Escapement</text>
</svg>
