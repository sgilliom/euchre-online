<svg viewBox="0 0 480 220" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <rect width="480" height="220" fill="#0f172a" rx="8"/>
  <text x="240" y="20" fill="#6366f1" font-size="11" text-anchor="middle" font-weight="bold">AUTOMOTIVE — SHEET METAL WELDING FIXTURE</text>

  <!-- fixture base -->
  <rect x="80" y="160" width="320" height="16" fill="#334155" rx="3"/>
  <rect x="100" y="152" width="12" height="10" fill="#475569" rx="1"/>
  <rect x="200" y="152" width="12" height="10" fill="#475569" rx="1"/>
  <rect x="368" y="152" width="12" height="10" fill="#475569" rx="1"/>

  <!-- sheet metal part on fixture -->
  <rect x="120" y="132" width="240" height="22" fill="#64748b" stroke="#94a3b8" stroke-width="1.5" rx="2"/>
  <!-- stamping details -->
  <rect x="150" y="137" width="40" height="12" fill="#475569" rx="2"/>
  <rect x="240" y="137" width="40" height="12" fill="#475569" rx="2"/>
  <rect x="330" y="137" width="30" height="12" fill="#475569" rx="2"/>

  <!-- clamp left -->
  <rect x="85" y="80" width="28" height="55" fill="#1e3a5f" stroke="#6366f1" stroke-width="2" rx="4"/>
  <!-- clamp arm left -->
  <path d="M113,100 Q140,95 145,132" stroke="#6366f1" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="145" cy="132" r="5" fill="#22c55e"/>
  <!-- clamp cylinder indicator -->
  <rect x="90" y="88" width="18" height="8" fill="#6366f1" rx="2"/>
  <text x="99" y="95" fill="#fff" font-size="6" text-anchor="middle">CYL</text>

  <!-- clamp right -->
  <rect x="367" y="80" width="28" height="55" fill="#1e3a5f" stroke="#6366f1" stroke-width="2" rx="4"/>
  <!-- clamp arm right -->
  <path d="M367,100 Q340,95 335,132" stroke="#6366f1" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="335" cy="132" r="5" fill="#22c55e"/>
  <rect x="372" y="88" width="18" height="8" fill="#6366f1" rx="2"/>
  <text x="381" y="95" fill="#fff" font-size="6" text-anchor="middle">CYL</text>

  <!-- welding robot arm -->
  <line x1="240" y1="40" x2="240" y2="80" stroke="#94a3b8" stroke-width="3"/>
  <line x1="240" y1="80" x2="215" y2="115" stroke="#94a3b8" stroke-width="3"/>
  <circle cx="215" cy="115" r="5" fill="#475569"/>
  <!-- weld gun -->
  <line x1="215" y1="120" x2="215" y2="135" stroke="#f59e0b" stroke-width="2.5"/>
  <polygon points="215,135 212,143 218,143" fill="#f59e0b"/>

  <!-- weld sparks -->
  <g fill="#fbbf24" opacity="0.9">
    <circle cx="215" cy="133" r="2"/>
    <circle cx="221" cy="128" r="1.5"/>
    <circle cx="209" cy="129" r="1.5"/>
    <circle cx="224" cy="135" r="1"/>
    <circle cx="206" cy="135" r="1"/>
    <circle cx="218" cy="122" r="1"/>
    <circle cx="226" cy="140" r="1.5"/>
    <circle cx="204" cy="140" r="1"/>
  </g>

  <!-- clamped indicator -->
  <text x="240" y="115" fill="#22c55e" font-size="9" text-anchor="middle">CLAMPED</text>

  <!-- labels -->
  <text x="99" y="148" fill="#94a3b8" font-size="8" text-anchor="middle">PHD CLAMP</text>
  <text x="381" y="148" fill="#94a3b8" font-size="8" text-anchor="middle">PHD CLAMP</text>
  <text x="215" y="158" fill="#f59e0b" font-size="8" text-anchor="middle">WELD GUN</text>

  <text x="240" y="195" fill="#94a3b8" font-size="9" text-anchor="middle">STAMPING  •  WELDING  •  METAL FORMING  •  ASSEMBLY</text>
</svg>
