<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Clamp body -->
  <rect x="30" y="45" width="55" height="30" rx="4" fill="#374151" stroke="#6B7280" stroke-width="1.5"/>
  <!-- Clamp arm (open) -->
  <path d="M60 45 L60 20 L90 20 L90 35" stroke="#4B5563" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Clamp arm pad -->
  <rect x="82" y="32" width="16" height="8" rx="2" fill="#1D4ED8"/>
  <!-- Work piece -->
  <rect x="70" y="38" width="35" height="5" rx="1" fill="#9CA3AF"/>
  <!-- Welding sparks -->
  <circle cx="95" cy="38" r="2" fill="#FCD34D"/>
  <line x1="95" y1="33" x2="97" y2="27" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="95" y1="33" x2="100" y2="30" stroke="#F97316" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="95" y1="33" x2="90" y2="28" stroke="#EF4444" stroke-width="1" stroke-linecap="round"/>
  <line x1="95" y1="33" x2="102" y2="36" stroke="#FCD34D" stroke-width="1" stroke-linecap="round"/>
  <!-- Cylinder actuating clamp -->
  <rect x="10" y="53" width="22" height="14" rx="3" fill="#1D4ED8"/>
  <!-- Piston rod -->
  <rect x="28" y="57" width="8" height="6" rx="1" fill="#93C5FD"/>
  <!-- Port -->
  <circle cx="18" cy="50" r="2.5" fill="#1E293B"/>
  <!-- Label -->
  <text x="60" y="85" font-family="Arial" font-size="6" fill="#9CA3AF" text-anchor="middle">PHD Pneumatic Clamp</text>
</svg>
