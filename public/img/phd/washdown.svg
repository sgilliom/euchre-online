<svg viewBox="0 0 480 220" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <rect width="480" height="220" fill="#0f172a" rx="8"/>
  <text x="240" y="20" fill="#6366f1" font-size="11" text-anchor="middle" font-weight="bold">FOOD PROCESSING — HIGH-PRESSURE WASHDOWN ENVIRONMENT</text>

  <!-- floor/drain -->
  <rect x="20" y="185" width="440" height="20" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <line x1="50" y1="185" x2="60" y2="205" stroke="#334155" stroke-width="1"/>
  <line x1="120" y1="185" x2="130" y2="205" stroke="#334155" stroke-width="1"/>
  <line x1="200" y1="185" x2="210" y2="205" stroke="#334155" stroke-width="1"/>
  <line x1="300" y1="185" x2="310" y2="205" stroke="#334155" stroke-width="1"/>
  <line x1="380" y1="185" x2="390" y2="205" stroke="#334155" stroke-width="1"/>
  <text x="240" y="198" fill="#475569" font-size="8" text-anchor="middle">DRAIN</text>

  <!-- conveyor with meat product -->
  <rect x="40" y="160" width="380" height="10" fill="#334155" rx="2"/>
  <rect x="160" y="140" width="60" height="22" fill="#dc2626" rx="4" stroke="#991b1b" stroke-width="1"/>
  <text x="190" y="155" fill="#fca5a5" font-size="8" text-anchor="middle">PRODUCT</text>
  <rect x="280" y="140" width="60" height="22" fill="#dc2626" rx="4" stroke="#991b1b" stroke-width="1"/>

  <!-- IP69K cylinder (center piece) -->
  <rect x="205" y="60" width="70" height="35" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2" rx="4"/>
  <rect x="235" y="45" width="10" height="17" fill="#475569" rx="2"/>
  <rect x="235" y="93" width="10" height="25" fill="#60a5fa" rx="2"/>
  <!-- IP69K badge -->
  <rect x="210" y="65" width="35" height="14" fill="#1d4ed8" rx="3"/>
  <text x="227" y="75" fill="#fff" font-size="8" text-anchor="middle" font-weight="bold">IP69K</text>
  <!-- stainless label -->
  <text x="240" y="115" fill="#22c55e" font-size="9" text-anchor="middle">SS ELECTRIC CYLINDER</text>

  <!-- water spray nozzles -->
  <rect x="50" y="50" width="20" height="8" fill="#475569" rx="2"/>
  <rect x="390" y="50" width="20" height="8" fill="#475569" rx="2"/>

  <!-- water spray drops left -->
  <g fill="#38bdf8" opacity="0.8">
    <circle cx="75" cy="72" r="2.5"/>
    <circle cx="85" cy="85" r="2"/>
    <circle cx="68" cy="90" r="2"/>
    <circle cx="90" cy="100" r="2.5"/>
    <circle cx="72" cy="110" r="2"/>
    <circle cx="82" cy="68" r="1.5"/>
    <circle cx="95" cy="78" r="2"/>
    <circle cx="65" cy="80" r="2"/>
    <circle cx="78" cy="98" r="2.5"/>
    <circle cx="92" cy="115" r="1.5"/>
    <circle cx="100" cy="90" r="2"/>
    <circle cx="60" cy="95" r="2.5"/>
    <circle cx="88" cy="60" r="1.5"/>
    <circle cx="105" cy="105" r="2"/>
  </g>
  <!-- water spray drops right -->
  <g fill="#38bdf8" opacity="0.8">
    <circle cx="400" cy="72" r="2.5"/>
    <circle cx="390" cy="85" r="2"/>
    <circle cx="405" cy="90" r="2"/>
    <circle cx="385" cy="100" r="2.5"/>
    <circle cx="408" cy="110" r="2"/>
    <circle cx="395" cy="68" r="1.5"/>
    <circle cx="380" cy="78" r="2"/>
    <circle cx="410" cy="80" r="2"/>
    <circle cx="392" cy="98" r="2.5"/>
    <circle cx="382" cy="115" r="1.5"/>
    <circle cx="375" cy="90" r="2"/>
    <circle cx="412" cy="95" r="2.5"/>
    <circle cx="387" cy="60" r="1.5"/>
    <circle cx="370" cy="105" r="2"/>
  </g>

  <!-- pressure label -->
  <text x="57" y="46" fill="#38bdf8" font-size="8" text-anchor="middle">HIGH</text>
  <text x="57" y="55" fill="#38bdf8" font-size="8" text-anchor="middle">PRESSURE</text>
  <text x="400" y="46" fill="#38bdf8" font-size="8" text-anchor="middle">CAUSTIC</text>
  <text x="400" y="55" fill="#38bdf8" font-size="8" text-anchor="middle">WASHDOWN</text>

  <!-- CIP label -->
  <rect x="150" y="28" width="160" height="16" fill="#0f172a" stroke="#334155" rx="3"/>
  <text x="230" y="40" fill="#f59e0b" font-size="9" text-anchor="middle">CLEAN-IN-PLACE (CIP) ENVIRONMENT</text>
</svg>
