<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background panel -->
  <rect x="5" y="5" width="110" height="110" rx="8" fill="#0F172A"/>
  <!-- IP69K shield badge -->
  <path d="M60 15 L90 28 L90 60 Q90 85 60 100 Q30 85 30 60 L30 28 Z" fill="#1E40AF" stroke="#3B82F6" stroke-width="2"/>
  <text x="60" y="55" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">IP69K</text>
  <text x="60" y="68" font-family="Arial" font-size="7" fill="#93C5FD" text-anchor="middle">Rated</text>
  <!-- Water spray drops around cylinder -->
  <ellipse cx="20" cy="40" rx="4" ry="6" fill="#60A5FA" opacity="0.8" transform="rotate(-30 20 40)"/>
  <ellipse cx="100" cy="40" rx="4" ry="6" fill="#60A5FA" opacity="0.8" transform="rotate(30 100 40)"/>
  <ellipse cx="15" cy="70" rx="4" ry="6" fill="#60A5FA" opacity="0.6" transform="rotate(-15 15 70)"/>
  <ellipse cx="105" cy="70" rx="4" ry="6" fill="#60A5FA" opacity="0.6" transform="rotate(15 105 70)"/>
  <!-- Spray lines -->
  <line x1="12" y1="25" x2="28" y2="42" stroke="#93C5FD" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="108" y1="25" x2="92" y2="42" stroke="#93C5FD" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Small water drops -->
  <circle cx="22" cy="90" r="2" fill="#60A5FA"/>
  <circle cx="35" cy="100" r="2" fill="#60A5FA"/>
  <circle cx="85" cy="100" r="2" fill="#60A5FA"/>
  <circle cx="98" cy="90" r="2" fill="#60A5FA"/>
  <!-- Temperature symbol -->
  <text x="60" y="82" font-family="Arial" font-size="8" fill="#FCD34D" text-anchor="middle">80°C</text>
</svg>
