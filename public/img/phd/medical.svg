<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Syringe barrel -->
  <rect x="20" y="50" width="70" height="20" rx="4" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <!-- Graduation markings -->
  <line x1="35" y1="50" x2="35" y2="58" stroke="#6B7280" stroke-width="1"/>
  <line x1="47" y1="50" x2="47" y2="58" stroke="#6B7280" stroke-width="1"/>
  <line x1="59" y1="50" x2="59" y2="58" stroke="#6B7280" stroke-width="1"/>
  <line x1="71" y1="50" x2="71" y2="58" stroke="#6B7280" stroke-width="1"/>
  <!-- Fluid inside -->
  <rect x="21" y="51" width="45" height="18" rx="3" fill="#BFDBFE" opacity="0.7"/>
  <!-- Needle -->
  <rect x="90" y="57" width="25" height="6" rx="1" fill="#9CA3AF"/>
  <path d="M115 57 L122 60 L115 63 Z" fill="#6B7280"/>
  <!-- Plunger -->
  <rect x="10" y="46" width="12" height="28" rx="2" fill="#3B82F6"/>
  <rect x="5" y="54" width="7" height="12" rx="1" fill="#1D4ED8"/>
  <!-- Finger flanges -->
  <rect x="16" y="44" width="4" height="8" rx="1" fill="#1D4ED8"/>
  <rect x="16" y="68" width="4" height="8" rx="1" fill="#1D4ED8"/>
  <!-- Clean room symbol -->
  <circle cx="60" cy="95" r="15" fill="none" stroke="#10B981" stroke-width="2"/>
  <text x="60" y="91" font-family="Arial" font-size="6" fill="#10B981" text-anchor="middle">ISO</text>
  <text x="60" y="100" font-family="Arial" font-size="7" fill="#10B981" text-anchor="middle" font-weight="bold">Class 7</text>
</svg>
