<svg viewBox="0 0 480 220" xmlns="http://www.w3.org/2000/svg" font-family="monospace">
  <rect width="480" height="220" fill="#0f172a" rx="8"/>
  <text x="240" y="20" fill="#6366f1" font-size="11" text-anchor="middle" font-weight="bold">MEDICAL DEVICE — SYRINGE ASSEMBLY (CLEANROOM)</text>

  <!-- cleanroom background -->
  <rect x="20" y="35" width="440" height="160" fill="#0a1628" rx="6" stroke="#1e3a5f" stroke-width="1"/>
  <text x="240" y="52" fill="#1e3a5f" font-size="9" text-anchor="middle">CLEANROOM / FDA REGULATED ENVIRONMENT</text>

  <!-- assembly fixture -->
  <rect x="140" y="130" width="200" height="40" fill="#1e293b" stroke="#334155" stroke-width="1.5" rx="4"/>
  <rect x="155" y="118" width="30" height="14" fill="#334155" rx="2"/>
  <rect x="225" y="118" width="30" height="14" fill="#334155" rx="2"/>
  <rect x="295" y="118" width="30" height="14" fill="#334155" rx="2"/>

  <!-- syringes in fixture -->
  <!-- syringe 1 -->
  <rect x="160" y="85" width="8" height="35" fill="#e0f2fe" rx="1" stroke="#7dd3fc" stroke-width="0.8"/>
  <rect x="158" y="82" width="12" height="6" fill="#7dd3fc" rx="1"/>
  <line x1="164" y1="118" x2="164" y2="126" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- syringe 2 -->
  <rect x="230" y="85" width="8" height="35" fill="#e0f2fe" rx="1" stroke="#7dd3fc" stroke-width="0.8"/>
  <rect x="228" y="82" width="12" height="6" fill="#7dd3fc" rx="1"/>
  <line x1="234" y1="118" x2="234" y2="126" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- syringe 3 -->
  <rect x="300" y="85" width="8" height="35" fill="#e0f2fe" rx="1" stroke="#7dd3fc" stroke-width="0.8"/>
  <rect x="298" y="82" width="12" height="6" fill="#7dd3fc" rx="1"/>
  <line x1="304" y1="118" x2="304" y2="126" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- precision electric gripper above syringe 2 -->
  <rect x="222" y="55" width="24" height="14" fill="#6366f1" rx="3"/>
  <!-- parallel gripper jaws -->
  <rect x="220" y="67" width="6" height="18" fill="#4f46e5" rx="1"/>
  <rect x="238" y="67" width="6" height="18" fill="#4f46e5" rx="1"/>
  <!-- gripper rod up -->
  <rect x="232" y="40" width="8" height="17" fill="#475569" rx="2"/>
  <!-- gantry rail -->
  <rect x="100" y="33" width="280" height="10" fill="#334155" rx="3"/>
  <!-- gripper label -->
  <text x="234" y="98" fill="#22c55e" font-size="7" text-anchor="middle">PRECISION</text>
  <text x="234" y="107" fill="#22c55e" font-size="7" text-anchor="middle">ELECTRIC</text>

  <!-- FDA badge -->
  <rect x="30" y="60" width="70" height="22" fill="#1d4ed8" rx="4"/>
  <text x="65" y="70" fill="#fff" font-size="8" text-anchor="middle" font-weight="bold">FDA</text>
  <text x="65" y="79" fill="#bfdbfe" font-size="7" text-anchor="middle">APPROVED</text>

  <!-- force spec -->
  <rect x="30" y="90" width="90" height="22" fill="#1e293b" stroke="#22c55e" rx="3"/>
  <text x="75" y="100" fill="#22c55e" font-size="8" text-anchor="middle">HIGH PRECISION</text>
  <text x="75" y="109" fill="#22c55e" font-size="8" text-anchor="middle">REPEATABLE FORCE</text>

  <!-- material label -->
  <rect x="360" y="60" width="90" height="32" fill="#1e293b" stroke="#6366f1" rx="3"/>
  <text x="405" y="73" fill="#a5b4fc" font-size="8" text-anchor="middle">CLEANROOM-SAFE</text>
  <text x="405" y="83" fill="#a5b4fc" font-size="8" text-anchor="middle">MATERIALS</text>

  <text x="234" y="185" fill="#94a3b8" font-size="9" text-anchor="middle">SYRINGES  •  IV BAGS  •  TUBING  •  PHARMACEUTICALS</text>
</svg>
