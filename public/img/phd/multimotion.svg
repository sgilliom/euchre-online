<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Actuator body -->
  <rect x="35" y="40" width="50" height="40" rx="5" fill="#374151" stroke="#6B7280" stroke-width="1.5"/>
  <!-- Output shaft -->
  <circle cx="60" cy="60" r="10" fill="#1D4ED8" stroke="#3B82F6" stroke-width="1.5"/>
  <circle cx="60" cy="60" r="4" fill="#DBEAFE"/>
  <!-- Linear motion arrow (extend) -->
  <line x1="60" y1="18" x2="60" y2="38" stroke="#10B981" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M55 20 L60 13 L65 20" fill="#10B981"/>
  <!-- Rotary motion arc -->
  <path d="M80 60 A20 20 0 0 0 60 40" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M57 40 L60 34 L64 40" fill="#F59E0B"/>
  <!-- Labels -->
  <text x="75" y="25" font-family="Arial" font-size="7" fill="#10B981">Linear</text>
  <text x="88" y="48" font-family="Arial" font-size="7" fill="#F59E0B">Rotary</text>
  <!-- Mounting base -->
  <rect x="25" y="80" width="70" height="10" rx="2" fill="#1E293B" stroke="#374151" stroke-width="1"/>
  <!-- Mounting bolt holes -->
  <circle cx="35" cy="85" r="2.5" fill="#6B7280"/>
  <circle cx="85" cy="85" r="2.5" fill="#6B7280"/>
  <!-- Label -->
  <text x="60" y="103" font-family="Arial" font-size="6" fill="#9CA3AF" text-anchor="middle">Multi-Motion Actuator</text>
</svg>
