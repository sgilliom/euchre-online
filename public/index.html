<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Euchre Online</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#ffd700;--felt:#2d7a4f;--red:#d32f2f;--blue:#1a237e}
body{background:#0a0a0a;color:#f0f0f0;font-family:system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
.screen{display:none;flex:1}
.screen.active{display:flex}

/* Lobby */
#lobby{flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#1a3a2a,#0a0a0a)}
.box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:36px;width:360px;max-width:95vw}
h1{font-size:2.2rem;text-align:center;color:var(--gold);margin-bottom:6px}
.sub{text-align:center;color:rgba(255,255,255,.45);font-size:.85rem;margin-bottom:28px}
label{display:block;font-size:.75rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
input{width:100%;padding:11px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#fff;font-size:1rem;outline:none;margin-bottom:14px}
input:focus{border-color:var(--gold)}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .15s;margin-bottom:8px}
.btn-gold{background:var(--gold);color:#1a1a1a}
.btn-gold:hover{background:#ffe44d}
.btn-sec{background:rgba(255,255,255,.09);color:#fff;border:1px solid rgba(255,255,255,.18)}
.btn-sec:hover{background:rgba(255,255,255,.14)}
.divider{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.3);font-size:.8rem;margin:8px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1)}
.nav{display:flex;justify-content:center;gap:18px;margin-top:18px}
.nav a{color:rgba(255,255,255,.45);text-decoration:none;font-size:.82rem}
.nav a:hover{color:var(--gold)}

/* Waiting */
#waiting{flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#1a3a2a,#0a0a0a);gap:16px}
.room-code{background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);border-radius:8px;padding:10px 16px;text-align:center;margin-bottom:18px}
.room-code .lbl{font-size:.72rem;color:rgba(255,255,255,.45)}
.room-code .code{font-size:1.7rem;font-weight:bold;color:var(--gold);letter-spacing:3px}
.seat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.seat{background:rgba(255,255,255,.04);border:1px dashed rgba(255,255,255,.15);border-radius:8px;padding:10px;text-align:center;font-size:.85rem}
.seat.taken{background:rgba(45,122,79,.18);border-color:rgba(45,122,79,.4);border-style:solid}
.seat.me{background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.35);border-style:solid}
.seat-name{font-weight:600}
.seat-lbl{font-size:.7rem;color:rgba(255,255,255,.38);margin-top:2px}
.series-row{display:flex;gap:6px;margin-bottom:16px}
.sbtn{flex:1;padding:7px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);border-radius:6px;color:#fff;cursor:pointer;font-size:.8rem}
.sbtn.on{background:rgba(255,215,0,.12);border-color:var(--gold);color:var(--gold)}

/* Game */
#game{flex-direction:row;height:100vh;overflow:hidden}
.gmain{flex:1;display:flex;flex-direction:column;min-width:0}
.scorebar{background:rgba(0,0,0,.6);padding:7px 14px;display:flex;align-items:center;gap:16px;border-bottom:1px solid rgba(255,255,255,.07);font-size:.85rem;flex-wrap:wrap}
.score-badge{border-radius:20px;padding:2px 11px;font-weight:bold}
.s0{background:rgba(59,130,246,.22);color:#93c5fd}
.s1{background:rgba(239,68,68,.22);color:#fca5a5}
.trump{display:flex;align-items:center;gap:5px}
.trump-icon{font-size:1.1rem;font-weight:bold}

/* Table */
.table{flex:1;display:grid;grid-template-areas:". north ." "west center east" ". south .";grid-template-columns:150px 1fr 150px;grid-template-rows:110px 1fr 145px;background:radial-gradient(ellipse at center,#3a9a66,#2d7a4f 50%,#1a5c2a);padding:8px;gap:6px;position:relative;overflow:hidden}
.parea{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
.parea.north{grid-area:north}
.parea.south{grid-area:south}
.parea.west{grid-area:west}
.parea.east{grid-area:east}
.ntag{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.14);border-radius:20px;padding:3px 11px;font-size:.75rem;white-space:nowrap;max-width:130px;overflow:hidden;text-overflow:ellipsis}
.ntag.active{border-color:var(--gold);color:var(--gold);box-shadow:0 0 7px rgba(255,215,0,.3)}
.ntag.dealer::after{content:' D'}

/* Cards */
.card{background:#fff;border-radius:5px;border:1px solid #ccc;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;box-shadow:1px 2px 4px rgba(0,0,0,.3);transition:transform .12s,box-shadow .12s;position:relative}
.card.red{color:var(--red)}
.card.black{color:#111}
.card.sm{width:34px;height:49px;font-size:.65rem}
.card.md{width:48px;height:69px;font-size:.85rem}
.card.lg{width:62px;height:90px;font-size:1rem}
.card.play{cursor:pointer}
.card.play:hover{transform:translateY(-12px);box-shadow:2px 6px 14px rgba(0,0,0,.45);z-index:10}
.crank{font-weight:bold;line-height:1}
.csuit{font-size:1.15em;line-height:1}
.cback{background:repeating-linear-gradient(45deg,#1a237e,#1a237e 5px,#283593 5px,#283593 10px);border-radius:5px;border:2px solid #fff;box-shadow:1px 2px 4px rgba(0,0,0,.3)}
.cback.sm{width:34px;height:49px}
.cback.md{width:48px;height:69px}
.hrow{display:flex}
.hrow .card+.card{margin-left:-20px}
.hrow .card.play:hover{z-index:10}
.brow{display:flex}
.brow .cback+.cback{margin-left:-20px}

/* Center */
.center{grid-area:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;position:relative}
.trick-grid{display:grid;grid-template-areas:". n ." "w x e" ". s .";grid-template-columns:65px 65px 65px;grid-template-rows:75px 75px 75px;gap:3px}
.tslot{display:flex;align-items:center;justify-content:center}
.tslot.tn{grid-area:n}.tslot.ts{grid-area:s}.tslot.tw{grid-area:w}.tslot.te{grid-area:e}.tslot.tx{grid-area:x}
.upcard-wrap{display:flex;flex-direction:column;align-items:center;gap:3px}
.upcard-lbl{font-size:.65rem;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.4px}
.flash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.85);border-radius:10px;padding:10px 22px;font-size:.95rem;font-weight:bold;color:var(--gold);z-index:50;pointer-events:none;opacity:0;transition:opacity .35s;text-align:center;white-space:nowrap}
.flash.show{opacity:1}

/* Action bar */
.abar{background:rgba(0,0,0,.7);padding:9px 14px;display:flex;align-items:center;gap:8px;border-top:1px solid rgba(255,255,255,.07);min-height:54px;flex-wrap:wrap}
.albl{font-size:.82rem;color:rgba(255,255,255,.55)}
.abtn{padding:7px 14px;border-radius:6px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .12s}
.abtn:disabled{opacity:.3;cursor:not-allowed}
.abtn.go{background:#22c55e;color:#fff}.abtn.go:hover:not(:disabled){background:#16a34a}
.abtn.pass{background:rgba(255,255,255,.11);color:#fff}.abtn.pass:hover:not(:disabled){background:rgba(255,255,255,.18)}
.abtn.alone{background:#f59e0b;color:#111}.abtn.alone:hover:not(:disabled){background:#d97706}
.abtn.throw{background:#ef4444;color:#fff}.abtn.throw:hover:not(:disabled){background:#dc2626}
.abtn.auto{background:#7c3aed;color:#fff}
.srow{display:flex;gap:5px}
.suitbtn{width:42px;height:42px;border-radius:7px;border:2px solid transparent;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s}
.suitbtn:hover:not(:disabled){transform:scale(1.12)}
.suitbtn:disabled{opacity:.3;cursor:not-allowed}
.suitbtn.S,.suitbtn.C{background:#1e293b;color:#1e293b;border-color:#334155}
.suitbtn.H{background:#fff0f0;color:#dc2626;border-color:#fca5a5}
.suitbtn.D{background:#fff7f0;color:#ea580c;border-color:#fdba74}

/* Side panel */
.side{width:270px;background:rgba(8,8,8,.95);display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,.07)}
.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.07)}
.tab{flex:1;padding:9px;text-align:center;font-size:.82rem;cursor:pointer;color:rgba(255,255,255,.38);border-bottom:2px solid transparent;transition:all .2s}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.pane{display:none;height:100%;flex-direction:column}
.pane.on{display:flex}
.pcontent{flex:1;overflow:hidden;position:relative;display:flex;flex-direction:column}
.msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:7px}
.msg{font-size:.82rem}
.msg .mn{font-weight:600;color:var(--gold)}
.msg.sys{color:rgba(255,255,255,.38);font-style:italic;font-size:.77rem}
.cinput-row{padding:9px;border-top:1px solid rgba(255,255,255,.07);display:flex;gap:7px}
.cinput{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:7px 10px;color:#fff;font-size:.82rem;outline:none}
.csend{background:var(--gold);color:#1a1a1a;border:none;border-radius:6px;padding:7px 11px;cursor:pointer;font-weight:bold}
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:9px}
.vslot{position:relative;background:#111;border-radius:7px;overflow:hidden;aspect-ratio:4/3}
.vslot video{width:100%;height:100%;object-fit:cover}
.vname{position:absolute;bottom:3px;left:3px;background:rgba(0,0,0,.7);border-radius:3px;padding:1px 5px;font-size:.65rem}
.vctrls{padding:9px;display:flex;gap:7px;border-top:1px solid rgba(255,255,255,.07)}
.vbtn{flex:1;padding:7px;border-radius:6px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:#fff;cursor:pointer;font-size:.75rem}
.vbtn.off{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.4)}

/* Overlays */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:100;align-items:center;justify-content:center}
.ov.on{display:flex}
.ovbox{background:#12121e;border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:36px;text-align:center;max-width:380px;width:90%}
.ovtitle{font-size:1.7rem;font-weight:bold;color:var(--gold);margin-bottom:10px}
.ovsub{color:rgba(255,255,255,.65);margin-bottom:22px}
.ovbtns{display:flex;flex-direction:column;gap:9px}
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.88);border:1px solid rgba(255,255,255,.14);border-radius:8px;padding:9px 18px;font-size:.88rem;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}
/* Video bar */
.vbar{background:rgba(0,0,0,.7);padding:5px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
.vbar-tile{position:relative;width:72px;height:54px;background:#111;border-radius:6px;overflow:hidden;flex-shrink:0}
.vbar-tile video{width:100%;height:100%;object-fit:cover}
.vbar-name{position:absolute;bottom:2px;left:3px;font-size:.58rem;color:#fff;background:rgba(0,0,0,.65);border-radius:2px;padding:1px 4px;white-space:nowrap;overflow:hidden;max-width:66px;text-overflow:ellipsis}
.vbar-muted{position:absolute;top:2px;right:2px;font-size:.6rem;background:rgba(239,68,68,.8);border-radius:50%;width:14px;height:14px;display:none;align-items:center;justify-content:center}
.vbar-muted.show{display:flex}
.vbar-ctrls{display:flex;gap:6px;margin-left:auto}
.vbar-btn{padding:5px 11px;border-radius:6px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);color:#fff;cursor:pointer;font-size:.78rem;white-space:nowrap;transition:all .15s}
.vbar-btn:hover{background:rgba(255,255,255,.14)}
.vbar-btn.off{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.45);color:#fca5a5}
.vbar-btn.on{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.45);color:#86efac}
/* Build stamp */
#buildstamp{position:fixed;bottom:8px;left:10px;font-size:.65rem;color:rgba(255,255,255,.25);pointer-events:none;z-index:10}
@media(max-width:700px){.side{display:none}.table{grid-template-columns:90px 1fr 90px;grid-template-rows:85px 1fr 125px}}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby" class="screen active">
<div class="box">
  <h1>🃏 Euchre</h1>
  <p class="sub">Online multiplayer with video chat</p>
  <label>Your Name</label>
  <input id="lname" placeholder="Enter your name" maxlength="20">
  <label>Room Code</label>
  <input id="lroom" placeholder="Enter or create a room code" maxlength="20">
  <button class="btn btn-gold" onclick="joinRoom()">Join Game</button>
  <div class="divider">or</div>
  <button class="btn btn-sec" onclick="document.getElementById('lroom').value=randCode()">Generate Room Code</button>
</div>
</div>

<!-- WAITING -->
<div id="waiting" class="screen">
<div class="box" style="width:460px">
  <h2 style="text-align:center;color:var(--gold);margin-bottom:18px">Waiting Room</h2>
  <div class="room-code"><div class="lbl">Share this code with friends</div><div class="code" id="wcode">----</div></div>
  <div style="font-size:.72rem;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px">Players</div>
  <div class="seat-grid" id="seats"></div>
  <div style="font-size:.72rem;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px">Series Format</div>
  <div class="series-row" id="srow">
    <button class="sbtn on" data-t="single" onclick="selSeries('single')">Single</button>
    <button class="sbtn" data-t="bo3" onclick="selSeries('bo3')">Best of 3</button>
    <button class="sbtn" data-t="bo5" onclick="selSeries('bo5')">Best of 5</button>
  </div>
  <div style="display:flex;flex-direction:column;gap:9px">
    <button class="btn btn-gold" id="btnstart" style="display:none" onclick="sock.emit('start_game')">Start Game</button>
    <button class="btn btn-sec" id="btnbots" style="display:none" onclick="sock.emit('start_with_bots')">Start with AI Players</button>
  </div>
</div>
</div>

<!-- GAME -->
<div id="game" class="screen">
<div class="gmain">
  <!-- Video bar -->
  <div class="vbar" id="vbar">
    <div class="vbar-tile"><video id="v0" autoplay muted playsinline></video><div class="vbar-name" id="vn0">You</div></div>
    <div class="vbar-tile"><video id="v1" autoplay playsinline></video><div class="vbar-name" id="vn1"></div></div>
    <div class="vbar-tile"><video id="v2" autoplay playsinline></video><div class="vbar-name" id="vn2"></div></div>
    <div class="vbar-tile"><video id="v3" autoplay playsinline></video><div class="vbar-name" id="vn3"></div></div>
    <div class="vbar-ctrls">
      <button class="vbar-btn" id="vbtn-connect" onclick="startVideo()">📷 Enable Camera</button>
      <button class="vbar-btn" id="vbtn-mute" onclick="toggleMute()" style="display:none">🎤 Mute</button>
      <button class="vbar-btn" id="vbtn-cam" onclick="toggleCam()" style="display:none">📷 Hide Cam</button>
    </div>
  </div>
  <div class="scorebar">
    <span id="t0name" style="color:#93c5fd">Team 1</span>
    <span class="score-badge s0" id="sc0">0</span>
    <span id="sw0" style="font-size:.72rem;color:rgba(255,255,255,.38)"></span>
    <span style="color:rgba(255,255,255,.18)">vs</span>
    <span id="t1name" style="color:#fca5a5">Team 2</span>
    <span class="score-badge s1" id="sc1">0</span>
    <span id="sw1" style="font-size:.72rem;color:rgba(255,255,255,.38)"></span>
    <div style="flex:1"></div>
    <div class="trump" id="trumpd" style="display:none">Trump:<span class="trump-icon" id="trumpi"></span></div>
    <span id="trickd" style="font-size:.78rem;color:rgba(255,255,255,.45)"></span>
    <span id="makerd" style="font-size:.78rem;color:rgba(255,255,255,.45)"></span>
  </div>
  <div class="table">
    <div class="parea north">
      <div class="ntag" id="tagnorth">—</div>
      <div class="brow" id="cbnorth"></div>
    </div>
    <div class="parea west">
      <div class="ntag" id="tagwest">—</div>
      <div id="cbwest" style="display:flex;flex-direction:column;gap:3px"></div>
    </div>
    <div class="center">
      <div class="trick-grid">
        <div class="tslot tn" id="tkn"></div>
        <div class="tslot tw" id="tkw"></div>
        <div class="tslot tx">
          <div id="upcardw" style="display:none">
            <div class="upcard-wrap">
              <div class="upcard-lbl" id="uplbl">Turn card</div>
              <div id="upcard"></div>
            </div>
          </div>
        </div>
        <div class="tslot te" id="tke"></div>
        <div class="tslot ts" id="tks"></div>
      </div>
      <div class="flash" id="flash"></div>
    </div>
    <div class="parea east">
      <div id="cbeast" style="display:flex;flex-direction:column;gap:3px"></div>
      <div class="ntag" id="tageast">—</div>
    </div>
    <div class="parea south">
      <div class="hrow" id="myhand"></div>
      <div class="ntag" id="tagsouth" style="margin-top:6px">You</div>
    </div>
  </div>
  <div class="abar" id="abar"><span class="albl">Waiting...</span></div>
</div>
<div class="side">
  <div class="tabs">
    <div class="tab on">Chat</div>
  </div>
  <div class="pcontent">
    <div class="pane on" id="pchat">
      <div class="msgs" id="msgs"></div>
      <div class="cinput-row">
        <input class="cinput" id="ci" placeholder="Say something..." maxlength="300" onkeydown="if(event.key==='Enter')sendChat()">
        <button class="csend" onclick="sendChat()">➤</button>
      </div>
    </div>
  </div>
</div>
</div>

<!-- OVERLAYS -->
<div class="ov" id="ovgo">
<div class="ovbox">
  <div class="ovtitle" id="ovgotitle">Game Over</div>
  <div class="ovsub" id="ovgosub"></div>
  <div class="ovbtns">
    <button class="btn btn-gold" onclick="restart('single')">Play Again</button>
    <button class="btn btn-sec" onclick="restart('bo3')">Best of 3</button>
    <button class="btn btn-sec" onclick="restart('bo5')">Best of 5</button>
  </div>
</div>
</div>
<div class="ov" id="ovser">
<div class="ovbox">
  <div class="ovtitle" id="ovsertitle">Series Over!</div>
  <div class="ovsub" id="ovsersub"></div>
  <div class="ovbtns">
    <button class="btn btn-gold" onclick="restart('single')">Play Again</button>
    <button class="btn btn-sec" onclick="restart('bo3')">New Best of 3</button>
    <button class="btn btn-sec" onclick="restart('bo5')">New Best of 5</button>
  </div>
</div>
</div>
<div id="toast"></div>
<div id="buildstamp"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const SI={S:'♠',H:'♥',D:'♦',C:'♣'},SN={S:'Spades',H:'Hearts',D:'Diamonds',C:'Clubs'};
const isRed=s=>s==='H'||s==='D';
let sock=null,myRoom=null,mySeat=null,myName='',hostId=null,GS=null,RS=null,rtcCfg=null,localStream=null,peers={},muted=false,camOff=false,vidSlots={};

function randCode(){const w=['ACE','KING','JACK','BOWER','TRUMP','DEAL'];return w[Math.floor(Math.random()*w.length)]+Math.floor(Math.random()*900+100)}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function toast(m,d=2500){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),d)}
function switchTab(t){document.querySelectorAll('.tab').forEach((e,i)=>e.classList.toggle('on',(i===0&&t==='chat')||(i===1&&t==='video')));document.getElementById('pchat').classList.toggle('on',t==='chat');document.getElementById('pvideo').classList.toggle('on',t==='video')}
function selSeries(t){if(sock&&sock.id===hostId)sock.emit('select_series',{seriesType:t})}
function restart(t){document.getElementById('ovgo').classList.remove('on');document.getElementById('ovser').classList.remove('on');sock.emit('restart_game',{seriesType:t})}

function cardEl(c,size='md',playable=false){
  const d=document.createElement('div');
  d.className=`card ${isRed(c.suit)?'red':'black'} ${size}${playable?' play':''}`;
  d.innerHTML=`<div class="crank">${c.rank}</div><div class="csuit">${SI[c.suit]}</div>`;
  if(playable){d.dataset.suit=c.suit;d.dataset.rank=c.rank}
  return d;
}
function backEl(size='sm'){const d=document.createElement('div');d.className=`cback ${size}`;return d}

function joinRoom(){
  const n=document.getElementById('lname').value.trim();
  const r=document.getElementById('lroom').value.trim();
  if(!n){toast('Enter your name');return}
  if(!r){toast('Enter a room code');return}
  myName=n;myRoom=r;connect();
}

function connect(){
  sock=io();
  sock.on('connect',()=>sock.emit('join_room',{roomId:myRoom,playerName:myName}));
  sock.on('joined_room',({roomId,seat,name,hostId:hid,players})=>{
    mySeat=seat;myName=name;hostId=hid;
    show('waiting');
    document.getElementById('wcode').textContent=roomId;
    updateWaiting(players,hid,'single');
  });
  sock.on('room_state',s=>{
    RS=s;hostId=s.hostId;
    if(!GS)updateWaiting(s.players,s.hostId,s.seriesType);
    updSerBtns(s.seriesType);
    const ih=sock.id===s.hostId;
    document.getElementById('btnstart').style.display=ih?'block':'none';
    document.getElementById('btnbots').style.display=ih?'block':'none';
  });
  sock.on('game_state',s=>{GS=s;if(mySeat===null)mySeat=s.mySeat;show('game');render(s)});
  sock.on('player_joined',({name})=>toast(`${name} joined`));
  sock.on('player_left',({name})=>addMsg('sys',null,`${name} left`));
  sock.on('chat_message',({name,message})=>addMsg('player',name,message));
  sock.on('system_msg',({text})=>addMsg('sys',null,text));
  sock.on('error',({message})=>toast(message));
  sock.on('webrtc_offer',({fromId,offer})=>handleOffer(fromId,offer));
  sock.on('webrtc_answer',({fromId,answer})=>{const p=peers[fromId];if(p)p.setRemoteDescription(answer)});
  sock.on('webrtc_ice',({fromId,candidate})=>{const p=peers[fromId];if(p)p.addIceCandidate(candidate)});
}

function updateWaiting(players,hid,st){
  const g=document.getElementById('seats');g.innerHTML='';
  const labels=['Seat 1','Seat 2','Seat 3','Seat 4'];
  for(let s=0;s<4;s++){
    const p=players.find(x=>x.seat===s);
    const d=document.createElement('div');
    d.className='seat'+(p?' taken':'')+(p&&p.seat===mySeat?' me':'');
    d.innerHTML=`<div class="seat-name">${p?(p.isBot?'🤖 '+p.name:p.name):'Empty'}</div><div class="seat-lbl">${labels[s]}</div>`;
    g.appendChild(d);
  }
  if(st)updSerBtns(st);
}
function updSerBtns(t){document.querySelectorAll('.sbtn').forEach(b=>b.classList.toggle('on',b.dataset.t===t))}

/* Rendering */
const RPOS=['south','west','north','east'];
function relPos(seat){return mySeat===null?RPOS[seat]:RPOS[(seat-mySeat+4)%4]}

function render(g){
  document.getElementById('sc0').textContent=g.scores[0];
  document.getElementById('sc1').textContent=g.scores[1];
  document.getElementById('sw0').textContent=g.seriesType!=='single'?`(${g.seriesWins[0]}w)`:'';
  document.getElementById('sw1').textContent=g.seriesType!=='single'?`(${g.seriesWins[1]}w)`:'';
  if(g.trump){document.getElementById('trumpd').style.display='flex';const ti=document.getElementById('trumpi');ti.textContent=SI[g.trump];ti.className='trump-icon '+(isRed(g.trump)?'red':'black')}
  else document.getElementById('trumpd').style.display='none';
  document.getElementById('trickd').textContent=g.phase==='playing'?`Tricks ${g.trickCount[0]}-${g.trickCount[1]}`:'';
  if(g.maker!==null&&g.phase!=='waiting'){
    const mp=g.players&&g.players.find(p=>p.seat===g.maker);
    document.getElementById('makerd').textContent=(mp?mp.name:'?')+(g.goingAlone?' alone!':' made trump');
  }else document.getElementById('makerd').textContent='';

  // Team names
  if(g.players){
    const mt=mySeat%2,pt=(mySeat+2)%4,par=g.players.find(p=>p.seat===pt);
    document.getElementById(mt===0?'t0name':'t1name').textContent=`You & ${par?par.name:'?'}`;
    document.getElementById(mt===0?'t1name':'t0name').textContent='Opponents';
  }

  // Players
  if(g.players)g.players.forEach(p=>{
    const pos=relPos(p.seat);
    const tag=document.getElementById('tag'+pos);
    const cbs=document.getElementById('cb'+pos);
    if(!tag)return;
    const active=g.currentTurn===p.seat,dealer=g.dealer===p.seat;
    tag.textContent=(p.isBot?'🤖 ':'')+p.name+(p.autoPlay?' ⚡':'');
    tag.className='ntag'+(active?' active':'')+(dealer?' dealer':'');
    if(pos!=='south'&&cbs){
      const cnt=(g.cardCounts&&g.cardCounts[p.seat])||0;
      cbs.innerHTML='';
      for(let i=0;i<cnt;i++)cbs.appendChild(backEl('sm'));
      if(pos==='north'){cbs.style.flexDirection='row'}
      else{cbs.style.flexDirection='column';cbs.style.gap='3px'}
    }
  });

  renderHand(g);
  renderTrick(g);
  renderUpcard(g);
  renderAbar(g);

  // Overlays
  if(g.phase==='game_over'){
    const win=g.winner===mySeat%2;
    document.getElementById('ovgotitle').textContent=win?'🎉 You Win!':'😔 You Lose';
    document.getElementById('ovgosub').textContent=`Score: ${g.scores[0]} – ${g.scores[1]}`;
    document.getElementById('ovgo').classList.add('on');
  }else document.getElementById('ovgo').classList.remove('on');
  if(g.phase==='series_over'){
    const win=g.winner===mySeat%2;
    document.getElementById('ovsertitle').textContent=win?'🏆 Series Win!':'😔 Series Lost';
    document.getElementById('ovsersub').textContent=`Series: ${g.seriesWins[0]} – ${g.seriesWins[1]}`;
    document.getElementById('ovser').classList.add('on');
  }else document.getElementById('ovser').classList.remove('on');
  if(g.phase==='hand_result'&&g.lastHandResult)showFlash(g.lastHandResult.msg);
}

function renderHand(g){
  const el=document.getElementById('myhand');el.innerHTML='';
  if(!g.myHand||!g.myHand.length)return;
  const canPlay=g.phase==='playing'&&g.currentTurn===mySeat;
  const canDiscard=g.phase==='dealer_discard'&&mySeat===g.dealer;
  g.myHand.forEach(c=>{
    const d=cardEl(c,'lg',canPlay||canDiscard);
    if(canPlay||canDiscard)d.addEventListener('click',()=>clickCard(c));
    el.appendChild(d);
  });
  const tag=document.getElementById('tagsouth');
  const me=g.players&&g.players.find(p=>p.seat===mySeat);
  if(me){tag.textContent=me.name+(me.autoPlay?' ⚡':'');tag.className='ntag'+(g.currentTurn===mySeat?' active':'')+(g.dealer===mySeat?' dealer':'')}
}

function renderTrick(g){
  ['n','s','e','w'].forEach(x=>document.getElementById('tk'+x).innerHTML='');
  if(!g.currentTrick||!g.currentTrick.length)return;
  const map={north:'n',south:'s',east:'e',west:'w'};
  g.currentTrick.forEach(({card,seat})=>{
    const pos=relPos(seat);
    const el=document.getElementById('tk'+map[pos]);
    if(el)el.appendChild(cardEl(card,'md'));
  });
}

function renderUpcard(g){
  const w=document.getElementById('upcardw');
  if((g.phase==='bidding1'||g.phase==='bidding2')&&g.upcard){
    w.style.display='block';
    document.getElementById('uplbl').textContent=g.phase==='bidding2'?'Turned down':'Turn card';
    const uc=document.getElementById('upcard');uc.innerHTML='';
    const c=cardEl(g.upcard,'md');if(g.phase==='bidding2')c.style.opacity='.4';
    uc.appendChild(c);
  }else w.style.display='none';
}

function renderAbar(g){
  const bar=document.getElementById('abar');bar.innerHTML='';
  const isMe=g.currentTurn===mySeat;
  if(g.phase!=='waiting'){
    bar.appendChild(mkBtn('⚡ Auto','abtn auto',()=>sock.emit('toggle_auto_play')));
  }
  if(g.phase==='bidding1'){
    if(isMe){
      bar.appendChild(mkLbl(`Order up ${SI[g.upcard?.suit]}?`));
      bar.appendChild(mkBtn('Order Up','abtn go',()=>sock.emit('bid_order_up',{goAlone:false})));
      bar.appendChild(mkBtn('Go Alone!','abtn alone',()=>sock.emit('bid_order_up',{goAlone:true})));
      bar.appendChild(mkBtn('Pass','abtn pass',()=>sock.emit('bid_pass')));
    }else bar.appendChild(mkLbl(`Waiting for ${g.players?.find(p=>p.seat===g.currentTurn)?.name||'?'}...`));
  }else if(g.phase==='bidding2'){
    if(isMe){
      bar.appendChild(mkLbl('Name trump:'));
      const row=document.createElement('div');row.className='srow';
      ['S','H','D','C'].forEach(s=>{
        const b=document.createElement('button');b.className=`suitbtn ${s}`;b.textContent=SI[s];b.disabled=s===g.turnedDownSuit;
        b.title=SN[s];b.addEventListener('click',()=>sock.emit('bid_name_suit',{suit:s,goAlone:false}));row.appendChild(b);
      });
      bar.appendChild(row);
      if(mySeat!==g.dealer)bar.appendChild(mkBtn('Pass','abtn pass',()=>sock.emit('bid_pass')));
    }else bar.appendChild(mkLbl(`Waiting for ${g.players?.find(p=>p.seat===g.currentTurn)?.name||'?'}...`));
  }else if(g.phase==='dealer_discard'){
    bar.appendChild(mkLbl(mySeat===g.dealer?'Pick up & discard a card':`${g.players?.find(p=>p.seat===g.dealer)?.name||'?'} is discarding...`));
  }else if(g.phase==='playing'){
    if(isMe){bar.appendChild(mkLbl('Your turn — click a card'));if(g.canThrowIn)bar.appendChild(mkBtn('Throw In','abtn throw',()=>sock.emit('throw_in')))}
    else bar.appendChild(mkLbl(`Waiting for ${g.players?.find(p=>p.seat===g.currentTurn)?.name||'?'}...`));
  }else if(g.phase==='hand_result')bar.appendChild(mkLbl(g.lastHandResult?.msg||'Hand complete'));
  else if(g.phase==='waiting')bar.appendChild(mkLbl('Waiting for players...'));
}

function mkLbl(t){const s=document.createElement('span');s.className='albl';s.textContent=t;return s}
function mkBtn(t,c,fn){const b=document.createElement('button');b.className=c;b.textContent=t;b.addEventListener('click',fn);return b}

function clickCard(c){
  if(!GS||!sock)return;
  if(GS.phase==='dealer_discard'&&mySeat===GS.dealer){sock.emit('dealer_discard',{card:c});return}
  if(GS.phase==='playing'&&GS.currentTurn===mySeat)sock.emit('play_card',{card:c});
}

function showFlash(msg){const e=document.getElementById('flash');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),3200)}

/* Chat */
function addMsg(type,name,text){
  const d=document.createElement('div');
  if(type==='sys'){d.className='msg sys';d.textContent=text}
  else{d.className='msg';d.innerHTML=`<span class="mn">${name}:</span> ${text}`}
  const msgs=document.getElementById('msgs');msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;
}
function sendChat(){const i=document.getElementById('ci');const m=i.value.trim();if(!m||!sock)return;sock.emit('chat_message',{message:m});i.value=''}

/* WebRTC */
async function startVideo(){
  try{
    localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    document.getElementById('v0').srcObject=localStream;
    if(!rtcCfg){const r=await fetch('/api/rtc-config');rtcCfg=await r.json()}
    // Show mute/cam buttons, hide connect button
    document.getElementById('vbtn-connect').style.display='none';
    document.getElementById('vbtn-mute').style.display='';
    document.getElementById('vbtn-cam').style.display='';
    toast('Camera & mic connected!');
    // Call any already-joined peers
    if(RS)RS.players.filter(p=>!p.isBot&&p.id!==sock.id).forEach(p=>initiateCall(p.id));
  }catch(e){toast('Camera error: '+e.message)}
}
async function initiateCall(peerId){
  if(!localStream||!rtcCfg)return;
  const pc=mkPeer(peerId);
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  const offer=await pc.createOffer();
  await pc.setLocalDescription(offer);
  sock.emit('webrtc_offer',{targetId:peerId,offer});
}
function mkPeer(id){
  if(peers[id])peers[id].close();
  const pc=new RTCPeerConnection(rtcCfg||{iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
  peers[id]=pc;
  pc.onicecandidate=e=>{if(e.candidate)sock.emit('webrtc_ice',{targetId:id,candidate:e.candidate})};
  let slotIdx=1;
  pc.ontrack=e=>{
    // Find a free slot or reuse assigned slot for this peer
    if(!peers[id]._slot){
      for(let i=1;i<=3;i++){const el=document.getElementById('v'+i);if(!el.srcObject){peers[id]._slot=i;break}}
    }
    const slot=peers[id]._slot||1;
    document.getElementById('v'+slot).srcObject=e.streams[0];
    // Label it with the player's name if we know it
    if(RS){const pl=RS.players.find(p=>p.id===id);if(pl)document.getElementById('vn'+slot).textContent=pl.name}
  };
  return pc;
}
async function handleOffer(fromId,offer){
  if(!rtcCfg){const r=await fetch('/api/rtc-config');rtcCfg=await r.json()}
  const pc=mkPeer(fromId);
  if(localStream)localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  await pc.setRemoteDescription(offer);
  const ans=await pc.createAnswer();
  await pc.setLocalDescription(ans);
  sock.emit('webrtc_answer',{targetId:fromId,answer:ans});
}
function toggleMute(){
  muted=!muted;
  if(localStream)localStream.getAudioTracks().forEach(t=>t.enabled=!muted);
  const b=document.getElementById('vbtn-mute');
  b.textContent=muted?'🔇 Unmute':'🎤 Mute';
  b.classList.toggle('off',muted);
  if(sock)sock.emit('media_state',{muted,videoOff:camOff});
}
function toggleCam(){
  camOff=!camOff;
  if(localStream)localStream.getVideoTracks().forEach(t=>t.enabled=!camOff);
  const b=document.getElementById('vbtn-cam');
  b.textContent=camOff?'📷 Show Cam':'📷 Hide Cam';
  b.classList.toggle('off',camOff);
  if(sock)sock.emit('media_state',{muted,videoOff:camOff});
}
/* Build stamp */
fetch('/api/version').then(r=>r.json()).then(d=>{
  const el=document.getElementById('buildstamp');
  if(el&&d.buildTime){
    const dt=new Date(d.buildTime);
    el.textContent='Build: '+dt.toLocaleDateString()+' '+dt.toLocaleTimeString();
  }
}).catch(()=>{});
